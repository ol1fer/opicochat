name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: |
          cmake --preset linux-release
          cmake --build --preset linux-release -j

      - name: rename
        run: |
          cp build-linux/opicochat opicochat-linux-x64
          cp build-linux/opicochat_server opicochat_server-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            opicochat-linux-x64
            opicochat_server-linux-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: |
          cmake --preset windows-msvc-release
          cmake --build --preset windows-msvc-release -j

      - name: rename
        run: |
          cp build-windows/Release/opicochat.exe opicochat-windows-x64.exe
          cp build-windows/Release/opicochat_server.exe opicochat_server-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            opicochat-windows-x64.exe
            opicochat_server-windows-x64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: rename
        run: |
          cp build/opicochat opicochat-macos-x64
          cp build/opicochat_server opicochat_server-macos-x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            opicochat-macos-x64
            opicochat_server-macos-x64

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opicochat-linux-x64
            opicochat_server-linux-x64
            opicochat-windows-x64.exe
            opicochat_server-windows-x64.exe
            opicochat-macos-x64
            opicochat_server-macos-x64
          generate_release_notes: true
